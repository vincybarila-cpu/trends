name: Update Macro Data

on:
  schedule:
    - cron: '23 6 * * 1'   # ogni lunedì mattina (i dati macro escono a cadenza mensile/trimestrale)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data       # stesso gruppo del workflow orario: mai push concorrenti
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Aggiorna indicatori macroeconomici
        run: python update_macro.py

      - name: Commit e push se data.js è cambiato
        run: |
          git config user.name "trends-bot"
          git config user.email "actions@github.com"
          git add data.js
          if git diff --cached --quiet; then
            echo "Nessuna modifica da committare."
            exit 0
          fi
          git commit -m "Auto-update macro data"
          git pull --rebase
          git push
